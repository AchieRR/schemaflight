name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Test
        run: python -m pytest
      - name: Verify generated demo
        run: |
          python -m schemaflight compile \
            --catalog examples/ecommerce/catalog.json \
            --request examples/ecommerce/rename-email.json \
            --output examples/ecommerce/generated
          git diff --exit-code -- examples/ecommerce/generated

  datahub-package-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install pinned DataHub integration
        run: python -m pip install -e ".[dev,datahub]"
      - name: Verify official SDK serialization and Agent Context shapes
        run: python -m pytest tests/test_datahub_package_contract.py tests/test_datahub_catalog.py
